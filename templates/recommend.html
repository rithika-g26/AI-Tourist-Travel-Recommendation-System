<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Recommendation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo.png') }}">

</head>

<body class="recommend-page">
    <!-- ===========================
NAVBAR
=========================== -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="/dashboard">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 class="nav-logo">

            <span>AI Tourist Travel</span>

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/recommend">
                        Recommendation
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contact">
                        Contact
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="overlay">

<div class="recommend-box">

<h2 class="text-center mb-4">
AI Tourist Recommendation
</h2>

<form action="/result" method="POST" id="recommendForm">

<div class="mb-3">

<label class="form-label">
Select State
</label>

<select class="form-select" name="state">

    {% for state in states %}

        <option value="{{ state }}">
            {{ state }}
        </option>

    {% endfor %}

</select>

</div>

<div class="mb-3">

<label class="form-label">
Tourist Category
</label>

<select class="form-select" name="category">

    {% for category in categories %}

        <option value="{{ category }}">
            {{ category }}
        </option>

    {% endfor %}

</select>

</div>

<div class="mb-3">

<label class="form-label">
Best Time
</label>

<select class="form-select" name="best_time">

<option>Summer</option>

<option>Winter</option>

<option>Monsoon</option>

</select>

</div>

<button
    type="submit"
    class="btn btn-success w-100"
    id="recommendBtn">

    <i class="bi bi-search"></i>
      Get Recommendation

</button>

</form>

</div>

</div>
<!-- Loading Overlay -->

<div id="loadingScreen" style="display:none;">

    <div class="loading-box">

        <div class="spinner-border text-primary"
             style="width:4rem;height:4rem;"
             role="status">
        </div>

        <h3 class="mt-4">
            Finding the Best Tourist Place...
        </h3>

        <p>
            Please wait while our AI searches for the best destination.
        </p>

    </div>

</div>

<!-- Loading Overlay -->
<div id="loadingScreen">
    ...
</div>

<script>

    document.getElementById("recommendForm").addEventListener("submit", function(){

    document.getElementById("loadingScreen").style.display = "flex";

    document.getElementById("recommendBtn").disabled = true;

    document.getElementById("recommendBtn").innerHTML =
    "Finding Best Place...";

});

</script>
</body>
</html>
