<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Tourist Travel Recommendation System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo.png') }}">

</head>

<body>

<div class="overlay">

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-lg-4 col-md-6 col-sm-10">

<div class="login-card">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

<h2>AI Tourist Travel</h2>

<p>Recommendation System</p>

<form action="/" method="POST">

<div class="mb-3">

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
name="username"
placeholder="Username"
required>
</div>

</div>

<div class="mb-4">

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
name="password"
placeholder="Password"
required>
</div>

</div>

<button type="submit" class="btn btn-primary w-100 login-btn">
    Login
</button>
{% if error %}
<p style="color:red; text-align:center; margin-top:15px;">
    {{ error }}
</p>
{% endif %}

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
