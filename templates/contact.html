<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo.png') }}">

</head>

<body class="recommend-page">
    <!-- ===========================
NAVBAR
=========================== -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="/dashboard">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 class="nav-logo">

            <span>AI Tourist Travel</span>

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/recommend">
                        Recommendation
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contact">
                        Contact
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="overlay">

<div class="container">

<div class="recommend-box">

    <h2 class="text-center">

        <i class="bi bi-envelope-fill"></i>

        Contact Us

    </h2>

    <hr>
    <div class="row">

    <div class="col-md-6">

        <div class="mb-3">

            <label class="form-label">
                Full Name
            </label>

            <input type="text"
                   class="form-control"
                   placeholder="Enter your name">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input type="email"
                   class="form-control"
                   placeholder="Enter your email">

        </div>

        <div class="mb-3">

            <label class="form-label">
                Subject
            </label>

            <input type="text"
                   class="form-control"
                   placeholder="Enter subject">

        </div>

    </div>

    <div class="col-md-6">

        <div class="mb-3">

            <label class="form-label">
                Message
            </label>

            <textarea class="form-control"
                      rows="8"
                      placeholder="Write your message here..."></textarea>

        </div>

    </div>

</div>

<div class="text-center mt-4">

    <button class="btn btn-primary px-5">

        <i class="bi bi-send-fill"></i>

        Send Message

    </button>

</div>
<hr class="my-5">

<h3 class="text-center text-primary mb-4">
    Contact Information
</h3>

<div class="row text-center">

    <div class="col-md-4 mb-3">

        <div class="card shadow border-0 h-100">

            <div class="card-body">

                <i class="bi bi-telephone-fill text-primary"
                   style="font-size:45px;"></i>

                <h5 class="mt-3">Phone</h5>

                <p>+91 XXXXX XXXXX</p>

            </div>

        </div>

    </div>

    <div class="col-md-4 mb-3">

        <div class="card shadow border-0 h-100">

            <div class="card-body">

                <i class="bi bi-envelope-fill text-danger"
                   style="font-size:45px;"></i>

                <h5 class="mt-3">Email</h5>

                <p>example@email.com</p>

            </div>

        </div>

    </div>

    <div class="col-md-4 mb-3">

        <div class="card shadow border-0 h-100">

            <div class="card-body">

                <i class="bi bi-geo-alt-fill text-success"
                   style="font-size:45px;"></i>

                <h5 class="mt-3">Location</h5>

                <p>India</p>

            </div>

        </div>

    </div>

</div>

</div>

</div>

</div>

</body>

</html>
